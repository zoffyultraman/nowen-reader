name: nowen_reader
description: NowenReader Flutter 客户端 — 漫画/小说阅读器
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # 网络请求
  dio: ^5.4.0
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8
  # 状态管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  # 路由
  go_router: ^14.2.0
  # 图片缓存
  cached_network_image: ^3.3.1
  # 本地存储
  shared_preferences: ^2.2.3
  # UI 工具
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  photo_view: ^0.15.0
  # 工具
  intl: ^0.19.0
  timeago: ^3.6.1
  url_launcher: ^6.2.5
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
