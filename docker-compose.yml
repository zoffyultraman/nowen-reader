# ============================================================
# NowenReader - 一键部署
#
# 使用方法（只需一条命令）:
#   docker compose up -d
#
# 然后打开浏览器访问: http://localhost:3000
# ============================================================

services:
  nowen-reader:
    build:
      context: .
      args:
        VERSION: "0.2.0"
    container_name: nowen-reader
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # 数据库持久化（不要删除，否则丢失所有数据）
      - ./data:/data
      # 漫画文件目录 - 把你的漫画放这里（默认挂载到当前目录下的 comics 文件夹）
      - ./comics:/app/comics

      # NAS 额外目录（可选，取消注释并修改路径）
      # - /mnt/nas/manga:/mnt/nas/manga
      # - /volume1/comics:/volume1/comics

      # 缩略图缓存持久化（加速启动）
      - ./cache:/app/.cache
    environment:
      - GIN_MODE=release
      - DATABASE_URL=/data/nowen-reader.db
      - COMICS_DIR=/app/comics
      - DATA_DIR=/app/.cache
      - PORT=3000
      - TZ=Asia/Shanghai
